; ╔══════════════════════════════════════════════════════════╗
; ║       raw_hailo_inference  –  configuration file         ║
; ╚══════════════════════════════════════════════════════════╝

; ── Hailo ──────────────────────────────────────────────────
[hailo]
hef_path        = /usr/share/picam-hailo/models/yolov8m.hef
pipeline_depth  = 8                    ; inflight frames on NPU
fps_limit       = 30.0                 ; max inference fps (0 = unlimited)

; ── UDP raw input (picam-raw) ───────────────────────────────
; port/width/height default from the shared /etc/aipicam/streams.conf
; (aipicam-config package) — picam-raw's wire protocol carries no
; width/height field, so this file's own copy previously risked
; silently drifting from what picam-raw actually sends. Set them here
; to explicitly override the shared file for local debugging.
[input]
host            = 127.0.0.1
buffer_frames   = 4                    ; TSQueue depth (drop-oldest)
ping_every      = 5                    ; seconds between registration pings

; ── Output ──────────────────────────────────────────────────
[output]
ctrl_port       = 8557                 ; status   : echo status | nc 127.0.0.1 8557
det_port        = 8558                 ; stream   : nc 127.0.0.1 8558
